<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER-OPS | ENTERPRISE TACTICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background: #000; color: #00FF41; overflow: hidden; }
        .crt { animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.98; } 50% { opacity: 1; } }
        .glass { background: rgba(0, 20, 0, 0.8); border: 1px solid #004400; backdrop-filter: blur(5px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <header class="flex justify-between items-center mb-4 border-b border-[#00FF41] pb-2">
        <div class="text-xl font-bold italic tracking-tighter">CYBER-OPS // [ENT_NODE_01]</div>
        <div id="clock" class="text-xs">SYSTEM_TIME: 00:00:00</div>
    </header>

    <main class="flex-grow flex gap-4">
        <div class="w-1/3 glass p-4 overflow-y-auto scrollbar-hide">
            <h2 class="text-xs font-bold mb-4 opacity-70 border-b border-[#00FF41]">TACTICAL MODULES</h2>
            <div id="module-list" class="space-y-1"></div>
        </div>

        <div class="w-2/3 glass p-4 flex flex-col">
            <div id="terminal" class="flex-grow overflow-y-auto text-sm"></div>
            <div id="status-bar" class="mt-2 text-[10px] border-t border-[#00FF41] pt-1">STATUS: READY</div>
        </div>
    </main>

    <script>
        // Enterprise Module Registry
        const modules = [
            { id: "GPS", name: "PRECISION GEO-LOC", action: getExactLocation },
            { id: "IP", name: "IP FORENSICS", url: "https://ipapi.co/json/" },
            { id: "CRYPTO", name: "ASSET MONITOR", url: "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd" }
        ];

        const term = document.getElementById('terminal');
        const list = document.getElementById('module-list');

        function log(msg, type = "SYS") {
            const time = new Date().toLocaleTimeString();
            term.innerHTML += `<div>[${time}] [${type}] ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        async function getExactLocation() {
            log("INITIATING GPS HANDSHAKE...");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    log(`LAT: ${p.coords.latitude} | LON: ${p.coords.longitude}`, "GEO");
                }, () => log("PERMISSION DENIED", "ERR"));
            }
        }

        // Initialize UI
        modules.forEach(m => {
            const btn = document.createElement('button');
            btn.className = "block w-full text-left p-2 hover:bg-[#00FF41] hover:text-black transition uppercase text-xs";
            btn.innerText = `> ${m.name}`;
            btn.onclick = () => {
                log(`EXECUTING ${m.name}...`);
                if(m.action) m.action(); else fetch(m.url).then(r => r.json()).then(d => log(JSON.stringify(d)));
            };
            list.appendChild(btn);
        });

        setInterval(() => document.getElementById('clock').innerText = "SYSTEM_TIME: " + new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
