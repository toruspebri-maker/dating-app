<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #00FF41; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        /* CCTV Utama Layar Penuh */
        #cctv-feed { width: 100vw; height: 100vh; border: none; }
        /* Widget Peta Serangan Siber (Diperkecil) */
        .map-widget { position: absolute; bottom: 15px; right: 15px; width: 280px; height: 180px; border: 1px solid #00FF41; background: #000; overflow: hidden; }
        /* Panel Menu Melayang */
        .glass { background: rgba(0,0,0,0.85); border: 1px solid #00FF41; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <iframe id="cctv-feed" src="https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g"></iframe>

    <div class="glass absolute top-4 left-4 p-3 w-52 text-[10px]">
        <div class="font-bold border-b border-[#00FF41] mb-2">OPERATOR_PROFILE</div>
        <div id="user-info" class="mb-3">LOADING...</div>
        
        <button onclick="autoDetectCCTV()" class="w-full text-left p-1 border border-[#ff0000] text-[#ff0000] mb-2 animate-pulse">>> AUTO-SCAN REGION CCTV</button>
        <button onclick="updateCCTV('https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g')" class="w-full text-left p-1 border border-[#00FF41] mb-1">CCTV: ASIA_NODE</button>
        <button onclick="updateCCTV('https://www.youtube.com/embed/live_stream?channel=UCh2mH_0G467yYwZ5Gz8G6gQ')" class="w-full text-left p-1 border border-[#00FF41]">CCTV: GLOBAL_NODE</button>
    </div>

    <div class="map-widget">
        <div class="text-[8px] p-1 border-b border-[#00FF41]">LIVE_THREAT_MONITOR</div>
        <iframe class="w-full h-full" src="https://threatmap.checkpoint.com/"></iframe>
    </div>

    <script>
        // Profil Pengguna
        const userDiv = document.getElementById('user-info');
        userDiv.innerHTML = `ID: OPS_${Math.floor(Math.random()*9000)}<br>PLATFORM: ${navigator.platform}<br>STATUS: ACTIVE_GLOBAL`;

        function updateCCTV(url) { document.getElementById('cctv-feed').src = url; }

        // Fungsi Deteksi Lokasi untuk CCTV Lokal
        function autoDetectCCTV() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    // Logika: Jika di Indonesia (lat antara -11 s/d 6)
                    if (lat >= -11 && lat <= 6) {
                        updateCCTV('https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g');
                    } else {
                        updateCCTV('https://www.youtube.com/embed/live_stream?channel=UCh2mH_0G467yYwZ5Gz8G6gQ');
                    }
                    alert("CCTV disesuaikan dengan wilayah Anda: " + lat.toFixed(2));
                });
            } else {
                alert("Geolocation tidak didukung.");
            }
        }
    </script>
</body>
</html>
