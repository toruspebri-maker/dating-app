<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-OPS | GLOBAL TACTICAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00FF41; font-family: 'Courier New', Courier, monospace; }
        .cyber-box { border: 1px solid #00FF41; background: #0a0a0a; }
        .scan-line { animation: scan 2s linear infinite; }
        @keyframes scan { from { transform: translateY(0); } to { transform: translateY(100%); } }
        #terminal { height: 250px; overflow-y: auto; background: #000; border: 1px solid #00FF41; padding: 10px; }
    </style>
</head>
<body class="p-4 max-w-4xl mx-auto">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold tracking-widest text-shadow">CYBER-OPS TERMINAL</h1>
        <p class="text-xs uppercase text-gray-500">Global Cyber Intelligence & Reconnaissance</p>
    </header>

    <div id="terminal" class="mb-4 text-sm whitespace-pre-wrap font-bold">
> SYSTEM BOOT... 
> MODULES LOADED (30/30)
> AWAITING COMMANDS...
    </div>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>

    <script>
        const modules = [
            { name: "IP Trace", url: "https://ipapi.co/json/" },
            { name: "DNS Lookup", url: "https://api.hackertarget.com/dnslookup/?q=google.com&format=json" },
            { name: "Geo-Loc", url: "https://get.geojs.io/v1/ip/geo.json" },
            { name: "Crypto", url: "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd" },
            { name: "Server Status", url: "https://api.github.com/zen" },
            { name: "User Agent", url: "https://httpbin.org/user-agent" },
            { name: "Public Holidays", url: "https://date.nager.at/api/v3/NextPublicHolidaysWorldwide" },
            { name: "Tech News", url: "https://hacker-news.firebaseio.com/v0/item/2921983.json" },
            { name: "Gen Predict", url: "https://api.genderize.io/?name=alex" },
            { name: "Bored Task", url: "https://www.boredapi.com/api/activity" },
            // ... Tambahkan URL lain untuk mengaktifkan semua slot
        ];

        const grid = document.getElementById('grid');
        const term = document.getElementById('terminal');

        function log(msg) { term.innerText += "\n> " + msg; term.scrollTop = term.scrollHeight; }

        async function run(mod) {
            term.innerText = "> INITIALIZING " + mod.name.toUpperCase() + "...";
            try {
                const res = await fetch(mod.url);
                const data = await res.json();
                
                // Formatter cerdas untuk tampilan pro
                let output = `[INTEL REPORT - ${mod.name.toUpperCase()}]\n`;
                output += JSON.stringify(data, null, 2).substring(0, 400); 
                
                term.innerText = output + "\n\n> SCAN COMPLETED. AWAITING INPUT.";
            } catch(e) { term.innerText = "> ERROR: FIREWALL BLOCKED CONNECTION."; }
        }

        modules.forEach((mod, i) => {
            grid.innerHTML += `<div class="cyber-box p-2 text-[10px] text-center hover:bg-[#00FF41] hover:text-black transition" onclick="run(modules[${i}])">${i+1}. ${mod.name}</div>`;
        });
    </script>
</body>
</html>
