<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL_COMMAND_CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .cyber-map { flex: 1; position: relative; border-bottom: 2px solid #00FF41; }
        .dashboard { height: 40vh; background: #000; padding: 10px; overflow-y: auto; }
        .glass-box { border: 1px solid #00FF41; padding: 10px; margin-bottom: 10px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn-menu { border: 1px solid #00FF41; padding: 8px 2px; text-align: center; font-size: 8px; cursor: pointer; }
        .btn-menu:hover { background: #00FF41; color: #000; }
    </style>
</head>
<body>

    <div class="cyber-map">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full"></iframe>
    </div>

    <div class="dashboard">
        <div class="glass-box text-center">
            <div class="text-[10px]">MINING_STATUS: <span class="text-white">ACTIVE</span></div>
            <div id="balance" class="text-2xl font-bold">0.00428640 BTC</div>
        </div>

        <div class="menu-grid">
            <div class="btn-menu">DAILY_REWARD</div>
            <div class="btn-menu">REFERRAL</div>
            <div class="btn-menu">DEPOSIT</div>
            <div class="btn-menu">WITHDRAW</div>
        </div>

        <div class="mt-4 flex justify-between items-center border-t border-[#00FF41] pt-2">
            <div class="text-[10px]">PROFILE: OPS_2365</div>
            <select class="bg-black border border-[#00FF41] text-[10px] p-1">
                <option>EN</option>
                <option>ID</option>
                <option>CN</option>
                <option>RU</option>
            </select>
        </div>
    </div>

    <script>
        // Logika Miner ringan agar layar tetap lancar
        setInterval(() => {
            let b = parseFloat(document.getElementById('balance').innerText);
            document.getElementById('balance').innerText = (b + 0.00000001).toFixed(8) + " BTC";
        }, 2000);
    </script>
</body>
</html>
