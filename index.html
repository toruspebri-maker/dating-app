<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_GLOBAL_ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desain kelas Enterprise: Smooth transition & No-flicker */
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        
        /* Glassmorphism untuk kesan mewah */
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Animasi Tombol */
        .btn-tap:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <main id="app" class="h-screen flex flex-col">
        
        <div id="page-home" class="page active flex-1 p-6">
            <div class="h-1/3 mb-4 rounded-xl overflow-hidden border border-green-500/30">
                <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center">
                <div class="text-sm opacity-60">PXC BALANCE</div>
                <div class="text-4xl font-black">145.52 <span class="text-green-400">PXC</span></div>
                <button class="mt-8 w-40 h-40 bg-gradient-to-br from-yellow-400 to-orange-600 rounded-full shadow-[0_0_50px_rgba(234,179,8,0.5)] btn-tap flex items-center justify-center text-4xl font-bold">P</button>
            </div>
        </div>

        <div id="page-task" class="page flex-1 p-6">
            <h2 class="text-2xl font-bold mb-6">Missions</h2>
            <div class="space-y-4">
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <span>Play Puzzle ChaCha</span>
                    <button class="bg-blue-600 px-4 py-2 rounded-xl text-sm">PLAY</button>
                </div>
            </div>
        </div>

        <nav class="glass h-20 flex justify-around items-center text-[10px]">
            <div onclick="switchPage('page-home')" class="cursor-pointer">🏠 HOME</div>
            <div onclick="switchPage('page-task')" class="cursor-pointer">📋 TASKS</div>
            <div class="cursor-pointer">👥 INVITE</div>
            <div class="cursor-pointer">💼 WALLET</div>
        </nav>
    </main>

    <script>
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
