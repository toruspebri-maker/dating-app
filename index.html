<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER-OPS // TACTICAL CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap');
        body { background: #050505; color: #00FF41; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        .panel { background: #0a0a0a; border: 1px solid #00FF41; }
        .frame { width: 100%; height: 100%; border: none; }
        button { transition: 0.3s; }
    </style>
</head>
<body class="p-2 grid grid-cols-1 md:grid-cols-3 gap-2 h-screen">

    <!-- Kolom 1: Kontrol & Profil -->
    <div class="panel p-4 flex flex-col overflow-hidden">
        <!-- Profil Pengguna -->
        <div class="mb-4 p-2 border border-[#00FF41] text-[10px]">
            <div class="font-bold border-b border-[#00FF41] mb-1">OPERATOR_PROFILE</div>
            <div id="user-info">DETECTING_USER...</div>
        </div>

        <h2 class="text-xs font-bold border-b border-[#00FF41] pb-2 mb-2">TACTICAL COMMAND</h2>
        <div id="terminal" class="flex-grow overflow-y-auto text-[10px] space-y-1">
            <div class="text-[#00FF41]">>> SYSTEM_READY_ONLINE</div>
        </div>

        <div class="mt-4 grid grid-cols-1 gap-1 text-[9px]">
            <!-- CCTV Publik -->
            <button onclick="updateVisual('https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g')" class="p-2 border border-[#00FF41] hover:bg-[#00FF41] hover:text-black">LIVE CCTV: JAKARTA TRAFFIC</button>
            <button onclick="updateVisual('https://www.youtube.com/embed/live_stream?channel=UCh2mH_0G467yYwZ5Gz8G6gQ')" class="p-2 border border-[#00FF41] hover:bg-[#00FF41] hover:text-black">LIVE CCTV: TOKYO CROSSING</button>
            <button onclick="updateVisual('https://threatmap.checkpoint.com/')" class="p-2 border border-[#00FF41] hover:bg-[#00FF41] hover:text-black">CYBER THREAT MAP</button>
        </div>
    </div>

    <!-- Kolom 2 & 3: Visual Feed -->
    <div class="md:col-span-2 panel overflow-hidden relative">
        <div id="visual-overlay" class="absolute top-2 left-2 z-10 bg-black p-1 text-[10px] border border-[#00FF41]">ACTIVE_FEED: THREAT_MAP</div>
        <iframe id="visual-feed" class="frame" src="https://threatmap.checkpoint.com/"></iframe>
    </div>

    <script>
        const term = document.getElementById('terminal');
        const userDiv = document.getElementById('user-info');

        // Deteksi Profil Pengguna
        userDiv.innerHTML = `
            <div>ID: OPERATOR_ALPHA</div>
            <div>IP: ${window.location.hostname || "127.0.0.1"}</div>
            <div>PLATFORM: ${navigator.platform}</div>
            <div>STATUS: AUTHORIZED</div>
        `;

        function log(msg) { 
            term.innerHTML += `<div class="opacity-80">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        function updateVisual(url) {
            document.getElementById('visual-feed').src = url;
            document.getElementById('visual-overlay').innerText = "ACTIVE_FEED: " + url.substring(8, 22) + "...";
            log("SWITCHING VISUAL FEED TO: " + url);
        }

        log("INITIALIZING ENTERPRISE MODULES...");
        log("SATELLITE_LINK: ESTABLISHED");
        log("CCTV_FEED_ARRAY: LOADED");
    </script>
</body>
</html>
