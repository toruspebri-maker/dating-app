<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanaPremiumMine</title>
    <!-- Tailwind CSS untuk tampilan UI Premium -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- ⚠️ PASANG SCRIPT TAG MONETAG REWARDED INTERSTITIAL ANDA DI BAWAH SINI ⚠️ -->
    <!-- Contoh: <script src="https://libtl.com/sdk.js" data-zone="11226289" data-sdk="show_11226289"></script> -->
</head>
<body class="bg-slate-950 text-white font-sans antialiased select-none">

    <!-- CONTAINER UTAMA MINI APP -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-6 bg-gradient-to-b from-slate-900 to-slate-950 shadow-2xl relative overflow-hidden">
        
        <!-- Ornamen Latar Belakang Glow -->
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-teal-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <!-- HEADER SECTION -->
        <header class="relative z-10">
            <div class="flex items-center justify-between bg-slate-800/40 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-teal-500/20 flex items-center justify-center border border-teal-500/40">
                        <span class="text-teal-400 font-black tracking-wider text-xs">SOL</span>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Network Operator</p>
                        <h2 id="usernameDisplay" class="text-sm font-bold text-slate-200">SOL_OPERATOR</h2>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-xs px-2.5 py-1 rounded-full bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium">LV 1 Standard</span>
                </div>
            </div>

            <!-- 7-DAY STREAK -->
            <div class="mt-4 bg-slate-800/20 p-4 rounded-2xl border border-slate-800/80">
                <div class="flex justify-between items-center mb-2.5">
                    <p class="text-xs font-bold uppercase tracking-wider text-slate-400">7-Day Mining Streak Loyalty</p>
                    <span class="text-xs font-semibold text-teal-400">Bonus: 1.00x</span>
                </div>
                <div class="grid grid-cols-7 gap-2">
                    <div class="bg-teal-500 text-slate-950 font-bold text-xs py-2 rounded-xl text-center shadow-lg shadow-teal-500/20">D1</div>
                    <div class="bg-slate-800/80 text-slate-500 font-medium text-xs py-2 rounded-xl text-center border border-slate-700/30">D2</div>
                    <div class="bg-slate-800/80 text-slate-500 font-medium text-xs py-2 rounded-xl text-center border border-slate-700/30">D3</div>
                    <div class="bg-slate-800/80 text-slate-500 font-medium text-xs py-2 rounded-xl text-center border border-slate-700/30">D4</div>
                    <div class="bg-slate-800/80 text-slate-500 font-medium text-xs py-2 rounded-xl text-center border border-slate-700/30">D5</div>
                    <div class="bg-slate-800/80 text-slate-500 font-medium text-xs py-2 rounded-xl text-center border border-slate-700/30">D6</div>
                    <div class="bg-slate-800/80 text-slate-500 font-medium text-xs py-2 rounded-xl text-center border border-slate-700/30">D7</div>
                </div>
            </div>
        </header>

        <!-- MAIN DASHBOARD BALANCE -->
        <main class="flex-1 flex flex-col justify-center items-center my-8 relative z-10">
            <p class="text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">Your Wallet Balance</p>
            <div class="flex items-baseline gap-2 mb-1">
                <!-- Desimal dinaikkan menjadi 9 angka di belakang koma agar pergerakannya sangat detail dan lambat -->
                <h1 id="balanceDisplay" class="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-100 to-slate-400">0.000000000</h1>
                <span class="text-xl font-extrabold text-teal-400 tracking-wide">SOL</span>
            </div>
            <p class="text-xs text-slate-500 font-medium">Mining Speed: <span class="text-slate-400 font-semibold">0.00001% (Secure Faucet Rate)</span></p>

            <!-- MINING CORE INTERFACE -->
            <div class="w-full mt-10 bg-slate-900/60 backdrop-blur-sm p-6 rounded-3xl border border-slate-800 flex flex-col items-center shadow-xl">
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Solana Cloud Mining Core</p>
                
                <!-- TIMER COUNTDOWN -->
                <div id="timerDisplay" class="text-3xl font-mono font-bold text-amber-400 tracking-wider mb-6 bg-slate-950 px-6 py-2.5 rounded-2xl border border-slate-800 shadow-inner">02:00:00</div>
                
                <!-- THE CRITICAL BUTTON (TAP TO MINE) -->
                <button id="btnTapToMine" onclick="prosesAktivasiWithAd()" class="w-full bg-gradient-to-r from-teal-400 to-emerald-500 hover:from-teal-500 hover:to-emerald-600 active:scale-[0.98] text-slate-950 font-black tracking-wider text-sm py-4 rounded-2xl shadow-xl shadow-teal-500/20 transition-all cursor-pointer duration-200 uppercase">
                    Tap to Mine
                </button>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="w-full grid grid-cols-2 gap-4 mt-4">
                <button onclick="alert('Fitur Deposit Booster dinonaktifkan sementara untuk pemeliharaan jaringan.')" class="bg-slate-900 hover:bg-slate-800/80 border border-slate-800 text-slate-300 font-bold text-xs py-3.5 rounded-2xl transition-colors cursor-pointer flex flex-col items-center gap-0.5">
                    <span class="tracking-wide uppercase">⚡ Deposit</span>
                    <span class="text-[10px] text-slate-500 font-normal">Upgrade Speed</span>
                </button>
                <button onclick="prosesWithdrawSistem()" class="bg-slate-900 hover:bg-slate-800/80 border border-slate-800 text-slate-300 font-bold text-xs py-3.5 rounded-2xl transition-colors cursor-pointer flex flex-col items-center gap-0.5">
                    <span class="tracking-wide uppercase">💸 Withdraw</span>
                    <span class="text-[10px] text-slate-500 font-normal">Instant Payout</span>
                </button>
            </div>
        </main>

        <!-- FOOTER NAVIGATION BAR -->
        <footer class="relative z-10 bg-slate-900/80 backdrop-blur-md -mx-6 -mb-6 px-6 py-4 border-t border-slate-800/60 grid grid-cols-4 gap-1 text-center">
            <button class="text-teal-400 font-bold text-xs flex flex-col items-center gap-1 cursor-pointer">
                <div class="w-1.5 h-1.5 rounded-full bg-teal-400 mb-0.5"></div>
                <span>HOME</span>
            </button>
            <button onclick="alert('Misi belum tersedia harian.')" class="text-slate-500 hover:text-slate-300 font-semibold text-xs flex flex-col items-center gap-1 transition-colors cursor-pointer pt-2">
                <span>TASKS</span>
            </button>
            <button onclick="alert('Fitur referral akan aktif setelah update versi V5.')" class="text-slate-500 hover:text-slate-300 font-semibold text-xs flex flex-col items-center gap-1 transition-colors cursor-pointer pt-2">
                <span>INVITE</span>
            </button>
            <button onclick="alert('Profil Operator terenkripsi aman.')" class="text-slate-500 hover:text-slate-300 font-semibold text-xs flex flex-col items-center gap-1 transition-colors cursor-pointer pt-2">
                <span>PROFILE</span>
            </button>
        </footer>

    </div>

    <!-- ==================== JAVASCRIPT ENGINE SECURE & MAX PROFIT ==================== -->
    <script>
        // State Global (Mengambil penyimpanan lokal browser agar data tersimpan)
        let solBalance = parseFloat(localStorage.getItem('sol_secure_bal')) || 0.000000000;
        let isMiningActive = false;
        let countdownSeconds = 7200; // Sesi 2 Jam penuh
        let timerInterval = null;
        
        // Batas Penarikan Koin yang Sangat Tinggi (Biar Lambat WD)
        const MINIMUM_WITHDRAW = 2.500000000; 

        // DOM Elemen
        const balanceDisplay = document.getElementById('balanceDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const btnTapToMine = document.getElementById('btnTapToMine');

        // Render nilai awal saat aplikasi dibuka
        balanceDisplay.innerText = solBalance.toFixed(9);

        // ==================== ENGINE MONETAG WAJIB (ANTI BYPASS / ANTI RUGI) ====================
        function prosesAktivasiWithAd() {
            if (isMiningActive) {
                alert("Proses enkripsi cloud mining Anda sedang berjalan!");
                return;
            }

            // FILTER 1: CEK APAKAH SDK MONETAG DIAKTIFKAN ATAU DIBLOKIR AD-BLOCKER
            if (typeof show_11226289 !== "function") {
                alert("Sistem Keamanan Keuntungan: Script Iklan Gagal Dimuat! Silakan nonaktifkan Ad-Blocker / VPN Anda atau gunakan jaringan internet yang stabil untuk memulai mining.");
                return;
            }

            try {
                btnTapToMine.innerText = "LOADING SECURE AD...";
                btnTapToMine.disabled = true;

                // FILTER 2: WAJIB SELESAI NONTON IKLAN (.then)
                show_11226289().then(() => {
                    console.log("Verifikasi Sukses. Tayangan iklan Monetag sah terhitung keuntungan.");
                    
                    // Core Mining dijalankan hanya jika iklan tuntas ditonton
                    prosesAktivasiMiner();
                    alert('Sukses! Iklan tuntas diverifikasi. Sesi mining 2 jam dimulai.');
                }).catch((error) => {
                    // JIKA IKLAN DI-SKIP, DITUTUP PAKSA, ATAU ERROR DI TENGAH JALAN -> TOLAK MINING
                    console.log("Iklan digagalkan pengguna:", error);
                    btnTapToMine.disabled = false;
                    btnTapToMine.innerText = "Tap to Mine";
                    alert("Gagal: Anda wajib menyaksikan tayangan iklan sponsor tanpa dilewati untuk mendapatkan alokasi mining!");
                });

            } catch (err) {
                // Jaring pengaman eror browser agar tidak force close
                btnTapToMine.disabled = false;
                btnTapToMine.innerText = "Tap to Mine";
                alert("Saluran iklan sibuk. Silakan ketuk ulang dalam beberapa detik.");
            }
        }

        // ==================== ENGINE PERMINTAAN ALOKASI MINING DIKECILKAN (MEMPERLAMBAT WD) ====================
        function prosesAktivasiMiner() {
            isMiningActive = true;
            btnTapToMine.disabled = true;
            btnTapToMine.innerText = "MINING IN PROGRESS";
            btnTapToMine.className = "w-full bg-slate-800 text-teal-400 border border-teal-500/30 font-black tracking-wider text-sm py-4 rounded-2xl shadow-inner uppercase";
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (countdownSeconds > 0) {
                    countdownSeconds--;
                    
                    // NILAI DIPERLAMBAT: Hanya bertambah 0.000000002 SOL per detik!
                    // Matematika: 1 Sesi (2 Jam = 7200 detik) hanya menghasilkan 0.000014400 SOL.
                    // Untuk mencapai batas 2.5 SOL, user butuh sekitar 173.611 kali nonton iklan (Puluhan Tahun).
                    solBalance += 0.000000002; 
                    
                    // Simpan permanen di memori lokal agar tidak bisa di-refresh untuk reset saldo
                    localStorage.setItem('sol_secure_bal', solBalance);
                    
                    // Tampilkan ke layar desimal panjang
                    balanceDisplay.innerText = solBalance.toFixed(9);
                    timerDisplay.innerText = formatWaktuLengkap(countdownSeconds);
                } else {
                    // Sesi 2 Jam Berakhir
                    clearInterval(timerInterval);
                    isMiningActive = false;
                    countdownSeconds = 7200;
                    btnTapToMine.disabled = false;
                    btnTapToMine.innerText = "Tap to Mine";
                    btnTapToMine.className = "w-full bg-gradient-to-r from-teal-400 to-emerald-500 text-slate-950 font-black tracking-wider text-sm py-4 rounded-2xl shadow-xl shadow-teal-500/20 transition-all uppercase";
                    alert("Sesi mining Anda telah selesai. Tonton iklan baru untuk melanjutkan alokasi penambangan!");
                }
            }, 1000);
        }

        // ==================== LOGIKA CEK PENARIKAN (WITHDRAW LOCKER) ====================
        function prosesWithdrawSistem() {
            if (solBalance < MINIMUM_WITHDRAW) {
                alert(`⚠️ Penarikan Ditolak!\n\nBatas batas minimum pencairan adalah ${MINIMUM_WITHDRAW.toFixed(9)} SOL.\nSaldo Anda saat ini baru mencapai ${solBalance.toFixed(9)} SOL.\n\nKumpulkan saldo lebih banyak dengan melakukan mining harian!`);
            } else {
                alert("Permintaan penarikan dikirim. Sedang mengonfirmasi validitas blok jaringan (Estimasi proses: 14-30 Hari Kerja).");
            }
        }

        function formatWaktuLengkap(totalDetik) {
            let jam = Math.floor(totalDetik / 3600);
            let menit = Math.floor((totalDetik % 3600) / 60);
            let detik = totalDetik % 60;

            if (jam < 10) jam = "0" + jam;
            if (menit < 10) menit = "0" + menit;
            if (detik < 10) detik = "0" + detik;

            return jam + ":" + menit + ":" + detik;
        }
    </script>
</body>
</html>
