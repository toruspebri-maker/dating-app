<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00FF41; font-family: 'Courier New', monospace; }
        .glass-miner { background: rgba(0, 0, 0, 0.6); border: 2px solid #00FF41; box-shadow: 0 0 20px #00FF41; }
        .data-stream { color: #00FF41; font-size: 14px; text-shadow: 0 0 5px #00FF41; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-30">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full"></iframe>
    </div>

    <div class="glass-miner w-full max-w-md p-6 mt-10 text-center">
        <div class="text-[10px] uppercase tracking-widest">Mining Status: <span class="text-white">Active</span></div>
        <div id="miner-balance" class="text-4xl font-bold my-4 animate-pulse">0.00428190</div>
        <div class="text-xs opacity-80">BTC TOTAL MINED</div>
        
        <div class="grid grid-cols-2 gap-4 mt-8 text-[10px]">
            <div class="border p-2">HASH: 4.2 TH/s</div>
            <div class="border p-2">TEMP: 42°C</div>
        </div>

        <button onclick="toggleMiner()" id="btn-miner" class="w-full mt-6 py-3 border border-[#00FF41] hover:bg-[#00FF41] hover:text-black font-bold uppercase">
            Start Mining
        </button>
    </div>

    <script>
        let balance = 0.00428190;
        let active = false;
        function toggleMiner() {
            active = !active;
            const btn = document.getElementById('btn-miner');
            btn.innerText = active ? "Stop Mining" : "Start Mining";
            
            if(active) {
                setInterval(() => {
                    balance += 0.00000001;
                    document.getElementById('miner-balance').innerText = balance.toFixed(8);
                }, 500);
            }
        }
    </script>
</body>
</html>
