<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_GLOBAL_COMMAND_V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        
        /* Navigasi Mewah dengan Glow Effect */
        .nav-bar { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-top: 1px solid #222; }
        .nav-item { transition: 0.4s; color: #666; cursor: pointer; }
        .nav-item.active { color: #00FF41; text-shadow: 0 0 10px #00FF41; }
        
        /* Glassmorphism Card */
        .glass-ui { background: rgba(15, 15, 15, 0.7); border: 1px solid #333; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<main class="h-screen flex flex-col">
    <div class="h-[45%] w-full border-b-2 border-green-900 shadow-[0_0_25px_rgba(0,255,65,0.2)]">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
    </div>

    <div id="page-home" class="page active flex-1 p-4 overflow-y-auto">
        <div class="glass-ui p-6 rounded-2xl text-center mb-4 border border-green-900">
            <div class="text-[10px] text-green-500 uppercase tracking-widest font-bold">Solana Miner Status</div>
            <div id="sol-balance" class="text-4xl font-black my-3">12.450285 SOL</div>
            <div id="timer-text" class="text-xl font-mono text-yellow-400 mb-4">01:54:35</div>
            <button id="btn-mine" class="w-full py-4 bg-gradient-to-r from-green-700 to-green-500 rounded-xl text-black font-bold shadow-[0_0_15px_rgba(34,197,94,0.4)]">MINING IN PROGRESS...</button>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
            <button class="glass-ui p-4 rounded-xl text-[10px] uppercase font-bold hover:border-green-500 transition">💰 Deposit</button>
            <button class="glass-ui p-4 rounded-xl text-[10px] uppercase font-bold hover:border-green-500 transition">💸 Withdraw</button>
            <button class="glass-ui p-4 rounded-xl text-[10px] uppercase font-bold hover:border-green-500 transition">📋 Tasks</button>
            <button class="glass-ui p-4 rounded-xl text-[10px] uppercase font-bold hover:border-green-500 transition">👥 Invite</button>
        </div>
    </div>

    <nav class="nav-bar h-20 flex justify-around items-center px-2">
        <div onclick="switchPage('page-home', this)" class="nav-item active flex flex-col items-center">
            <span class="text-2xl">🏠</span><span class="text-[9px] font-bold">HOME</span>
        </div>
        <div class="nav-item flex flex-col items-center">
            <span class="text-2xl">📋</span><span class="text-[9px] font-bold">TASKS</span>
        </div>
        <div class="nav-item flex flex-col items-center">
            <span class="text-2xl">👥</span><span class="text-[9px] font-bold">INVITE</span>
        </div>
        <div onclick="switchPage('page-profile', this)" class="nav-item flex flex-col items-center">
            <span class="text-2xl">👤</span><span class="text-[9px] font-bold">PROFILE</span>
        </div>
    </nav>
</main>

<script>
    function switchPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
