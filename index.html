<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeleMatch Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b141c; color: white; font-family: sans-serif; overflow: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #ff007f 0%, #7928ca 100%); }
        .swipe-right { transform: translateX(150%) rotate(20deg) !important; opacity: 0; transition: all 0.5s ease; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- HEADER -->
    <div class="px-5 py-4 flex items-center justify-between border-b border-gray-800 bg-[#121b22]">
        <span class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400">TELEMATCH</span>
        <div class="bg-gray-800 px-3 py-1 rounded-full border border-gray-700 flex items-center space-x-1.5">
            <i class="fa-solid fa-star text-amber-400 text-xs"></i>
            <span class="text-xs font-bold text-amber-400" id="stars-count">0</span>
        </div>
    </div>

    <!-- MAIN SWIPE AREA -->
    <div class="flex-1 flex flex-col items-center justify-center p-4">
        <div id="profile-card" class="w-full max-w-sm h-[60vh] rounded-[28px] bg-cover bg-center flex flex-col justify-end p-6 border border-gray-800 bg-[url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600')]">
            <h2 class="text-2xl font-black">Nabila, 22</h2>
            <p class="text-sm text-gray-200">"Suka ngopi dan deep-talk ✨"</p>
        </div>

        <!-- REWARD AD BUTTON -->
        <button id="btn-ads" class="mt-6 bg-emerald-600 px-8 py-3 rounded-full font-bold shadow-lg active:scale-90 transition">
            <i class="fa-solid fa-play mr-2"></i>Nonton Iklan (+5 Stars)
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const supabase = supabase.createClient("https://khnutdbcmouvorhlrmvx.supabase.co", "Sb_publishable_THO_LNAdTebdBL46aouZDA_Hdm7psLU");
        const AdController = window.Adsgram.init({ blockId: "36435" });

        // Fungsi Reward
        async function addReward() {
            const userId = tg.initDataUnsafe.user.id;
            // Panggil fungsi SQL untuk menambah stars
            await supabase.rpc('increment_stars', { p_telegram_id: userId, amount: 5 });
            alert("Reward diterima! Saldo bertambah.");
            updateUI();
        }

        document.getElementById('btn-ads').addEventListener('click', () => {
            AdController.show().then((result) => {
                if (result.done) addReward();
            });
        });

        async function updateUI() {
            const userId = tg.initDataUnsafe.user.id;
            const { data } = await supabase.from('users').select('stars').eq('telegram_id', userId).single();
            if (data) document.getElementById('stars-count').innerText = data.stars;
        }

        tg.ready();
        tg.expand();
        updateUI();
    </script>
</body>
</html>
