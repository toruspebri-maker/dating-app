<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA_GLOBAL_COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px); border: 1px solid #333; }
        .btn-sol { background: linear-gradient(135deg, #9945FF, #14F195); color: #000; font-weight: 800; border-radius: 12px; }
        .nav-active { color: #14F195 !important; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-4 flex justify-between items-center bg-black/50 border-b border-green-900">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-green-500 animate-pulse"></div>
            <span class="font-bold">SOL_OPERATOR</span>
        </div>
        <div id="sol-balance" class="text-lg font-mono font-bold text-green-400">0.000000 SOL</div>
    </div>

    <main class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="h-48 rounded-2xl overflow-hidden border border-green-900">
            <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
        </div>

        <div class="glass-card p-6 rounded-2xl text-center">
            <div class="text-xs uppercase opacity-50 tracking-widest">Mining Status</div>
            <div id="timer-text" class="text-3xl font-mono my-2">00:00:00</div>
            <button id="mine-btn" onclick="startMining()" class="btn-sol w-full py-4 text-lg">START SOL MINING</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-4 rounded-xl text-center">💰 Deposit</div>
            <div class="glass-card p-4 rounded-xl text-center">💸 Withdraw</div>
            <div class="glass-card p-4 rounded-xl text-center">📋 Tasks</div>
            <div class="glass-card p-4 rounded-xl text-center">👥 Invite</div>
        </div>
    </main>

    <nav class="h-20 bg-black border-t border-gray-800 flex justify-around items-center">
        <div class="nav-active flex flex-col items-center">🏠<span class="text-[10px]">HOME</span></div>
        <div class="flex flex-col items-center">📋<span class="text-[10px]">TASKS</span></div>
        <div class="flex flex-col items-center">👥<span class="text-[10px]">INVITE</span></div>
        <div class="flex flex-col items-center">👤<span class="text-[10px]">PROFILE</span></div>
    </nav>

    <script>
        let saldo = parseFloat(localStorage.getItem('sol_saldo')) || 0;
        let endTime = parseInt(localStorage.getItem('sol_end_time')) || 0;

        function startMining() {
            const sekarang = Math.floor(Date.now() / 1000);
            endTime = sekarang + 7200; // 2 jam
            localStorage.setItem('sol_end_time', endTime);
            updateMining();
        }

        function updateMining() {
            const sekarang = Math.floor(Date.now() / 1000);
            const sisa = endTime - sekarang;
            
            if (sisa > 0) {
                let h = Math.floor(sisa / 3600);
                let m = Math.floor((sisa % 3600) / 60);
                let s = sisa % 60;
                document.getElementById('timer-text').innerText = `${h}:${m}:${s}`;
                document.getElementById('mine-btn').disabled = true;
                document.getElementById('mine-btn').innerText = "MINING...";
            } else {
                document.getElementById('mine-btn').disabled = false;
                document.getElementById('mine-btn').innerText = "CLAIM SOL";
                if (endTime !== 0) {
                    saldo += 0.05; // Reward
                    localStorage.setItem('sol_saldo', saldo);
                    document.getElementById('sol-balance').innerText = saldo.toFixed(6) + " SOL";
                    endTime = 0;
                    localStorage.setItem('sol_end_time', 0);
                }
            }
        }
        setInterval(updateMining, 1000);
    </script>
</body>
</html>
