<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_GLOBAL_COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        
        /* Tombol Mewah & Hidup */
        .btn-luxury { background: linear-gradient(135deg, #00FF41, #008f11); box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); transition: 0.3s; }
        .btn-luxury:active { transform: scale(0.98); }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }

        /* Navigasi Mewah */
        .nav-active { color: #00FF41 !important; border-top: 2px solid #00FF41; }
    </style>
</head>
<body>

<main class="h-screen flex flex-col">
    <div class="h-1/4 border-b border-green-900">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
    </div>

    <div id="page-home" class="page active flex-1 p-6 text-center">
        <div class="text-[10px] text-green-500 uppercase tracking-widest">Solana Cloud Mining</div>
        <div id="sol-balance" class="text-4xl font-bold text-white my-2">12.450285 SOL</div>
        <div class="w-full h-2 bg-gray-900 rounded-full mt-4 overflow-hidden">
            <div id="progress" class="h-full bg-green-500 w-full transition-all"></div>
        </div>
        <button id="claim-btn" class="mt-8 w-full py-4 rounded-xl btn-luxury text-black font-bold animate-pulse-slow" onclick="playAds()">
            CLAIM REWARD (2H)
        </button>
    </div>

    <div id="page-profile" class="page flex-1 p-6">
        <h2 class="text-xl font-bold mb-6">Profile Settings</h2>
        <div class="bg-gray-900 p-4 rounded-xl mb-4">
            <label class="text-[10px] opacity-50">LANGUAGE</label>
            <select class="w-full bg-transparent border-b border-green-500 mt-2 p-2 outline-none">
                <option>English</option>
                <option>Bahasa Indonesia</option>
                <option>Русский</option>
            </select>
        </div>
    </div>

    <nav class="h-20 bg-black border-t border-green-900 flex justify-around items-center text-[10px]">
        <div onclick="switchPage('page-home', this)" class="nav-item nav-active cursor-pointer">🏠 HOME</div>
        <div onclick="switchPage('page-profile', this)" class="nav-item cursor-pointer">👤 PROFILE</div>
    </nav>
</main>

<script>
    function switchPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('nav-active');
    }

    function playAds() {
        alert("Menampilkan Iklan... (Integrasi AdMob/AdSense di sini)");
        // Logika reset timer setelah iklan selesai
    }

    // Timer logic untuk progress bar
    let duration = 7200;
    setInterval(() => {
        if(duration > 0) {
            duration--;
            document.getElementById('progress').style.width = (duration/7200*100) + "%";
        }
    }, 1000);
</script>
</body>
</html>
