<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOC | Solana Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src='//libtl.com/sdk.js' data-zone='11226289' data-sdk='show_11226289'></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        solGreen: '#14F195',
                        solPurple: '#9945FF',
                        cyberDark: '#05050A',
                        glass: 'rgba(255, 255, 255, 0.05)',
                    },
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #05050A; color: #e2e8f0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #network-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
        .glass-panel { background: rgba(10, 10, 15, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6); }
        .text-glow-green { text-shadow: 0 0 10px rgba(20, 241, 149, 0.7); }
        .text-glow-purple { text-shadow: 0 0 10px rgba(153, 69, 255, 0.7); }
        .view-section { display: none !important; }
        .view-section.active { display: flex !important; animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(20, 241, 149, 0.7); } 70% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 0 15px rgba(20, 241, 149, 0); } 100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(20, 241, 149, 0); } }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #14F195; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between p-0 m-0 select-none">
    <canvas id="network-canvas"></canvas>

    <header class="glass-panel mx-4 mt-4 p-4 rounded-2xl flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-solPurple to-solGreen flex items-center justify-center p-[2px]">
                <div class="w-full h-full bg-cyberDark rounded-full border border-black flex items-center justify-center">
                    <span class="font-bold text-solGreen text-lg">G</span>
                </div>
            </div>
            <div>
                <h1 class="text-sm font-bold text-gray-400 uppercase tracking-widest" id="lang-title">GOC Server</h1>
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="status-text" class="text-xs text-red-500 font-mono">OFFLINE</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-400" id="lang-balance">Total Balance</div>
            <div class="font-mono text-xl font-bold text-solGreen text-glow-green" id="main-balance">0.00000000</div>
        </div>
    </header>

    <main class="flex-1 min-h-0 relative mx-4 my-3 z-10">
        <section id="view-console" class="view-section active absolute inset-0 flex flex-col gap-3">
            <div class="glass-panel p-5 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden shrink-0">
                <button id="btn-mining" class="relative w-28 h-28 rounded-full flex items-center justify-center transition-all duration-300 mb-3">
                    <div id="btn-ring" class="absolute inset-0 rounded-full border border-gray-700"></div>
                    <div id="btn-core" class="w-24 h-24 bg-gradient-to-b from-gray-800 to-black rounded-full border border-gray-700 flex items-center justify-center shadow-lg">
                        <svg class="w-8 h-8 text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                </button>
            </div>
            <div class="glass-panel p-4 rounded-2xl flex-1 flex flex-col min-h-0 overflow-hidden">
                <div id="terminal-output" class="font-mono text-[11px] text-gray-500 flex-1 overflow-y-auto terminal-scroll space-y-1 select-text"></div>
            </div>
        </section>
        <section id="view-tasks" class="view-section absolute inset-0 flex flex-col min-h-0 overflow-hidden"><div class="flex-1 overflow-y-auto terminal-scroll space-y-3 pr-1" id="task-list"></div></section>
        <section id="view-invite" class="view-section absolute inset-0 flex flex-col min-h-0 overflow-y-auto terminal-scroll gap-3"></section>
        <section id="view-wallet" class="view-section absolute inset-0 flex flex-col min-h-0 overflow-y-auto terminal-scroll gap-3">
            <button onclick="requestWithdraw()" class="bg-solPurple text-white font-bold py-3 rounded-xl text-xs w-full mt-2">Eksekusi Penarikan (Tunggu Persetujuan Admin)</button>
        </section>
    </main>

    <nav class="glass-panel mx-4 mb-4 rounded-2xl flex justify-around p-3 z-10 border-t border-white/5 shrink-0">
        <button onclick="changeLang()" class="text-[10px] text-white">Switch Lang</button>
        <button onclick="switchView('console')" class="nav-btn text-solGreen" data-target="console">Console</button>
        <button onclick="switchView('tasks')" class="nav-btn text-gray-500" data-target="tasks">Tasks</button>
    </nav>

    <script>
        // --- MULTI BAHASA ---
        const trans = {
            id: { title: "Server GOC", bal: "Total Saldo" },
            en: { title: "GOC Server", bal: "Total Balance" }
        };
        function changeLang() {
            let lang = localStorage.getItem('lang') === 'en' ? 'id' : 'en';
            localStorage.setItem('lang', lang);
            document.getElementById('lang-title').textContent = trans[lang].title;
            document.getElementById('lang-balance').textContent = trans[lang].bal;
        }

        // --- CORE LOGIC ---
        let state = { balance: 0.00000000, isMining: false };
        const elBal = document.getElementById('main-balance');
        
        // --- IKLAN IN-APP INTERSTITIAL ---
        function triggerAds() {
            if (typeof show_11226289 === 'function') {
                show_11226289({ type: 'inApp', inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false } });
            }
        }

        document.getElementById('btn-mining').addEventListener('click', () => {
            triggerAds();
            state.isMining = !state.isMining;
            // Logika mining ditingkatkan presisi 8 digit
        });

        function requestWithdraw() {
            alert("Penarikan diproses, menunggu persetujuan manual oleh Admin.");
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
        }
    </script>
</body>
</html>
