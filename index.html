<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER-OPS // TACTICAL CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap');
        body { background: #050505; color: #00FF41; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        .panel { background: #0a0a0a; border: 1px solid #00FF41; }
        .frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="p-2 grid grid-cols-1 md:grid-cols-3 gap-2 h-screen">

    <!-- Kolom 1: Kontrol & Log (Terminal) -->
    <div class="panel p-4 flex flex-col overflow-hidden">
        <h2 class="text-xs font-bold border-b border-[#00FF41] pb-2 mb-2">TACTICAL COMMAND</h2>
        <div id="terminal" class="flex-grow overflow-y-auto text-[10px] space-y-1">
            <div class="text-[#00FF41]">>> SYSTEM_READY_ONLINE</div>
        </div>
        <div class="mt-4 grid grid-cols-1 gap-1 text-[9px]">
            <button onclick="updateVisual('https://earth.nullschool.net/#current/wind/surface/level/orthographic=-105.41,20.25,3000')" class="p-2 border border-[#00FF41] hover:bg-[#00FF41] hover:text-black">LIVE WIND MAP</button>
            <button onclick="updateVisual('https://threatmap.checkpoint.com/')" class="p-2 border border-[#00FF41] hover:bg-[#00FF41] hover:text-black">CYBER THREAT MAP</button>
            <button onclick="updateVisual('https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1000000!2d106.8!3d-6.2!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sid!4v1')">GEO_LOC_TARGET</button>
        </div>
    </div>

    <!-- Kolom 2 & 3: Visual Feed (CCTV/Map) -->
    <div class="md:col-span-2 panel overflow-hidden relative">
        <div id="visual-overlay" class="absolute top-2 left-2 z-10 bg-black p-1 text-[10px] border border-[#00FF41]">ACTIVE_FEED: IDLE</div>
        <iframe id="visual-feed" class="frame" src="https://threatmap.checkpoint.com/"></iframe>
    </div>

    <script>
        const term = document.getElementById('terminal');
        function log(msg) { 
            term.innerHTML += `<div class="opacity-80">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        function updateVisual(url) {
            document.getElementById('visual-feed').src = url;
            document.getElementById('visual-overlay').innerText = "ACTIVE_FEED: " + url.substring(8, 20) + "...";
            log("SWITCHING VISUAL FEED TO: " + url);
        }

        log("INITIALIZING ENTERPRISE MODULES...");
        log("SATELLITE_LINK: ESTABLISHED");
        log("CYBER_THREAT_FEED: ACTIVE");
    </script>
</body>
</html>
