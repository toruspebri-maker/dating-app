<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_GLOBAL_ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        .nav-item { color: #555; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: #00FF41; border-top: 2px solid #00FF41; }
        .glass-card { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 16px; }
    </style>
</head>
<body>

<main class="h-screen flex flex-col">
    <div class="h-2/5 border-b border-green-900 shadow-[0_0_20px_rgba(0,255,65,0.2)]">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
    </div>

    <div id="page-home" class="page active flex-1 p-4 overflow-y-auto">
        <div class="glass-card p-6 text-center">
            <div class="text-[10px] text-green-500 uppercase tracking-widest">Solana Miner Status</div>
            <div id="sol-balance" class="text-4xl font-bold my-4">12.450285 SOL</div>
            <div id="timer-text" class="text-2xl font-mono text-yellow-400 mb-4">02:00:00</div>
            <button id="btn-mine" class="w-full py-4 bg-green-600 rounded-lg text-black font-bold" onclick="startMining()">START MINING</button>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-4">
            <div class="glass-card p-4 text-center cursor-pointer">📋 Tasks</div>
            <div class="glass-card p-4 text-center cursor-pointer">👥 Invite</div>
            <div class="glass-card p-4 text-center cursor-pointer">💰 Deposit</div>
            <div class="glass-card p-4 text-center cursor-pointer">💸 Withdraw</div>
        </div>
    </div>

    <div id="page-profile" class="page flex-1 p-6">
        <h2 class="text-xl font-bold mb-6">Profile Settings</h2>
        <div class="glass-card p-4">
            <label class="text-[10px] opacity-50 block mb-2">INTERFACE LANGUAGE</label>
            <select class="w-full bg-black border border-green-500 p-3 rounded-lg text-white">
                <option>English</option>
                <option>Bahasa Indonesia</option>
                <option>Русский</option>
            </select>
        </div>
    </div>

    <nav class="h-20 bg-black border-t border-gray-800 flex justify-around items-center px-2">
        <div onclick="switchPage('page-home', this)" class="nav-item active flex flex-col items-center"><span class="text-xl">🏠</span><span class="text-[9px]">HOME</span></div>
        <div class="nav-item flex flex-col items-center"><span class="text-xl">📋</span><span class="text-[9px]">TASKS</span></div>
        <div class="nav-item flex flex-col items-center"><span class="text-xl">👥</span><span class="text-[9px]">INVITE</span></div>
        <div onclick="switchPage('page-profile', this)" class="nav-item flex flex-col items-center"><span class="text-xl">👤</span><span class="text-[9px]">PROFILE</span></div>
    </nav>
</main>

<script>
    // Logika Navigasi
    function switchPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // Logika Mining (Nyata)
    function startMining() {
        let time = 7200;
        const btn = document.getElementById('btn-mine');
        const timer = document.getElementById('timer-text');
        btn.disabled = true;
        btn.innerText = "MINING IN PROGRESS...";
        
        let interval = setInterval(() => {
            time--;
            let h = Math.floor(time / 3600);
            let m = Math.floor((time % 3600) / 60);
            let s = time % 60;
            timer.innerText = `${h}:${m}:${s}`;
            
            if(time <= 0) {
                clearInterval(interval);
                btn.innerText = "CLAIM SOL";
                btn.disabled = false;
                btn.onclick = () => { alert("Reward Claimed!"); btn.innerText = "START MINING"; };
            }
        }, 1000);
    }
</script>
</body>
</html>
