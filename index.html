<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_COMMAND_CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-green: #00FF41; }
        body { background: #000; color: var(--neon-green); font-family: 'JetBrains Mono', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Map Container - Peta Threat Map Tetap Hidup */
        #map-container { flex: 1; border-bottom: 2px solid var(--neon-green); position: relative; z-index: 1; }
        
        /* Control Dashboard - Lebih Minimalis & Elegan */
        #dashboard { height: 20vh; background: #000; border-top: 1px solid var(--neon-green); padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        
        .btn-menu { border: 1px solid var(--neon-green); padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 10px; text-transform: uppercase; }
        .btn-menu:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 10px var(--neon-green); }
        
        /* Panel Geser - Agar Tidak Menumpuk */
        #side-panel { position: fixed; right: -100%; top: 0; width: 300px; height: 100%; background: rgba(0, 10, 0, 0.95); border-left: 2px solid var(--neon-green); transition: 0.5s ease-in-out; z-index: 100; padding: 20px; }
        #side-panel.open { right: 0; }
    </style>
</head>
<body>

    <div id="map-container">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
    </div>

    <div id="dashboard">
        <div class="grid grid-cols-4 gap-2 mb-2">
            <div class="btn-menu" onclick="openPanel('REWARD')">Reward</div>
            <div class="btn-menu" onclick="openPanel('REFERRAL')">Referral</div>
            <div class="btn-menu" onclick="openPanel('DEPOSIT')">Deposit</div>
            <div class="btn-menu" onclick="openPanel('WITHDRAW')">Withdraw</div>
        </div>
        <div class="text-[9px] text-center opacity-50">SYSTEM_ID: GOC-2026 // STATUS: ACTIVE_MONITORING</div>
    </div>

    <div id="side-panel">
        <div class="flex justify-between mb-4">
            <h2 id="panel-title" class="text-xs uppercase">TITLE</h2>
            <div class="cursor-pointer" onclick="closePanel()">CLOSE X</div>
        </div>
        <div id="panel-content" class="text-[10px]">Konten di sini...</div>
    </div>

    <script>
        function openPanel(type) {
            const panel = document.getElementById('side-panel');
            const title = document.getElementById('panel-title');
            const content = document.getElementById('panel-content');
            
            title.innerText = type;
            content.innerText = "Membuka modul " + type + "... Sistem sedang terkoneksi.";
            panel.classList.add('open');
        }

        function closePanel() {
            document.getElementById('side-panel').classList.remove('open');
        }
    </script>
</body>
</html>
