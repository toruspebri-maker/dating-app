<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #050505; color: #00FF41; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(12px); border: 1px solid #00FF41; }
        .visual-container { width: 100vw; height: 60vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .menu-bar { position: absolute; bottom: 0; width: 100%; height: 40vh; overflow-y: auto; }
        .btn-menu { background: rgba(0, 255, 65, 0.1); border: 1px solid #00FF41; padding: 10px; margin: 5px; text-transform: uppercase; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .btn-menu:hover { background: #00FF41; color: #000; }
    </style>
</head>
<body>

    <!-- VISUAL TENGAH: Real-time Cyber Attack (Nyata) -->
    <div class="visual-container">
        <iframe src="https://threatmap.checkpoint.com/"></iframe>
    </div>

    <!-- MENU BAWAH: Semua Fitur Nyata -->
    <div class="glass menu-bar p-4">
        <div class="text-[12px] font-bold mb-3 border-b border-[#00FF41]">SYSTEM_CORE // COMMAND_CENTER</div>
        
        <div class="grid grid-cols-2 gap-2">
            <!-- Profil -->
            <button class="btn-menu">USER: OPS_2365</button>
            <!-- CCTV Publik (Mengarahkan ke sumber live) -->
            <button class="btn-menu" onclick="window.open('https://www.youtube.com/@CCTV_LIVE_ID/streams')">CCTV_PUBLIK_LOKAL</button>
            <!-- Crypto Real-time -->
            <button class="btn-menu" onclick="window.open('https://www.tradingview.com/markets/cryptocurrencies/prices-all/')">CRYPTO_REALTIME</button>
            <!-- Lacak (Integrasi OpenStreetMap/Google) -->
            <button class="btn-menu" onclick="window.open('https://www.google.com/maps')">LACAK_GPS_DEVICE</button>
            <!-- Shortlink -->
            <button class="btn-menu">URL_SHORTENER_SECURE</button>
            <!-- Status -->
            <button class="btn-menu animate-pulse text-[#ff0000]">UPLINK: STABLE</button>
        </div>
    </div>

</body>
</html>
