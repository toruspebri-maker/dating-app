<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #00FF41; font-family: 'JetBrains Mono', monospace; overflow-y: auto; }
        .glass { background: #0a0a0a; border: 1px solid #00FF41; }
        /* CCTV Frame */
        #cctv-frame { width: 100%; height: 300px; border: 1px solid #00FF41; }
        /* Threat Map Frame */
        #map-frame { width: 100%; height: 250px; border: 1px solid #00FF41; }
    </style>
</head>
<body class="p-2 space-y-2">

    <div class="glass p-3 text-[10px]">
        <div class="font-bold border-b border-[#00FF41] mb-2">OPERATOR_PROFILE</div>
        <div id="user-info">ID: OPS_GLOBAL_2365 | STATUS: ACTIVE</div>
        <div class="mt-3 grid grid-cols-2 gap-2">
            <button onclick="autoDetectCCTV()" class="border border-[#ff0000] text-[#ff0000] p-1 animate-pulse">>> AUTO-SCAN REGION</button>
            <button onclick="updateCCTV('https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g')" class="border border-[#00FF41] p-1">CCTV: ASIA_NODE</button>
        </div>
    </div>

    <iframe id="cctv-frame" src="https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g"></iframe>

    <div class="text-[9px] font-bold mt-2">LIVE_THREAT_MONITOR</div>
    <iframe id="map-frame" src="https://threatmap.checkpoint.com/"></iframe>

    <script>
        function updateCCTV(url) { document.getElementById('cctv-frame').src = url; }

        function autoDetectCCTV() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    // Logic deteksi wilayah
                    if (lat >= -11 && lat <= 6) {
                        updateCCTV('https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g');
                    } else {
                        updateCCTV('https://www.youtube.com/embed/live_stream?channel=UCh2mH_0G467yYwZ5Gz8G6gQ');
                    }
                });
            }
        }
    </script>
</body>
        </html>
