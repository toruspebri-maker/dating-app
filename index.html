<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_COMMAND_CENTER_GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-green: #00FF41; }
        body { background: #000; color: var(--neon-green); font-family: 'JetBrains Mono', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Peta diperkecil (1/3 layar) agar dashboard lebih dominan */
        #map-container { height: 35vh; border-bottom: 2px solid var(--neon-green); }
        
        /* Dashboard Area - Kontainer Utama */
        #dashboard-area { flex: 1; position: relative; overflow: hidden; }
        .view { position: absolute; width: 100%; height: 100%; transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .view.active { opacity: 1; pointer-events: auto; }
        
        .btn-nav { border: 1px solid var(--neon-green); padding: 8px; text-align: center; cursor: pointer; font-size: 8px; text-transform: uppercase; }
        .btn-nav:hover { background: var(--neon-green); color: #000; }
    </style>
</head>
<body>

    <div id="map-container">
        <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
    </div>

    <div id="dashboard-area" class="p-4">
        
        <div id="view-home" class="view active">
            <div class="text-[10px] uppercase">Solana Cloud Mining</div>
            <div id="sol-balance" class="text-3xl font-bold text-white mb-2">12.450285 SOL</div>
            <div class="grid grid-cols-4 gap-2 mt-4">
                <div class="btn-nav" onclick="showView('view-reward')">Reward</div>
                <div class="btn-nav" onclick="showView('view-referral')">Referral</div>
                <div class="btn-nav" onclick="showView('view-deposit')">Deposit</div>
                <div class="btn-nav" onclick="showView('view-withdraw')">Withdraw</div>
            </div>
            <div class="mt-4 border border-[var(--neon-green)] p-2 cursor-pointer" onclick="showView('view-profile')">User Profile: OPS_2365</div>
        </div>

        <div id="view-withdraw" class="view">
            <h2 class="text-xl mb-4 text-white">WITHDRAW FUNDS</h2>
            <input type="text" placeholder="Amount (SOL)" class="w-full bg-black border border-[var(--neon-green)] p-2 mb-2">
            <button class="w-full bg-green-900 p-2 border border-[var(--neon-green)]">EXECUTE TRANSFER</button>
            <div class="mt-4 text-[10px] cursor-pointer" onclick="showView('view-home')">[ BACK TO DASHBOARD ]</div>
        </div>

        <div id="view-profile" class="view">
            <h2 class="text-xl mb-2 text-white">OPERATOR PROFILE</h2>
            <div class="text-[10px] mb-4">ID: OPS_2365 | Lvl: 42</div>
            <select id="lang-select" class="w-full bg-black border border-[var(--neon-green)] p-2 text-[10px]">
                <option value="en">ENGLISH</option>
                <option value="id">INDONESIA</option>
                <option value="ru">RUSSIAN</option>
                <option value="cn">CHINESE</option>
            </select>
            <div class="mt-4 text-[10px] cursor-pointer" onclick="showView('view-home')">[ BACK TO DASHBOARD ]</div>
        </div>
        
    </div>

    <script>
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // Miner Logic
        setInterval(() => {
            let sol = parseFloat(document.getElementById('sol-balance').innerText);
            document.getElementById('sol-balance').innerText = (sol + 0.000001).toFixed(6) + " SOL";
        }, 1000);
    </script>
</body>
</html>
