<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOC_GLOBAL_COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Area Konten Utama */
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Navigasi Bawah (Bottom Bar) */
        #bottom-nav { height: 70px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; color: #888; }
        .nav-item.active { color: #00FF41; }
    </style>
</head>
<body>

    <div id="content-area">
        <div id="page-home" class="page active p-4">
            <div id="map-container" class="h-40 w-full mb-4 border border-green-500">
                <iframe src="https://threatmap.checkpoint.com/" class="w-full h-full border-none"></iframe>
            </div>
            <div class="text-center py-10">
                <div class="text-xs uppercase opacity-60">Total Balance</div>
                <div class="text-3xl font-bold text-green-400">145.52 PXC</div>
                <div class="mt-6 w-32 h-32 bg-green-900 rounded-full mx-auto flex items-center justify-center animate-pulse">
                    <span class="text-4xl">P</span>
                </div>
                <button class="mt-8 bg-blue-600 px-10 py-3 rounded-full font-bold">CLAIM PXC</button>
            </div>
        </div>

        <div id="page-tasks" class="page p-4">
            <h2 class="text-xl font-bold mb-4">Daily Tasks</h2>
            <div class="bg-gray-900 p-4 rounded-xl mb-2">Game Puzzle ChaCha: <button class="text-blue-400 underline">Play Now</button></div>
            <div class="bg-gray-900 p-4 rounded-xl">Watch Ads: <button class="text-yellow-400 underline">Watch & Earn</button></div>
        </div>
    </div>

    <div id="bottom-nav">
        <div class="nav-item active" onclick="navigate('page-home', this)"><span>🏠</span>HOME</div>
        <div class="nav-item" onclick="navigate('page-tasks', this)"><span>📋</span>TASKS</div>
        <div class="nav-item" onclick="navigate('page-invite', this)"><span>👥</span>INVITE</div>
        <div class="nav-item" onclick="navigate('page-wallet', this)"><span>💼</span>WALLET</div>
    </div>

    <script>
        function navigate(pageId, element) {
            // Sembunyikan semua halaman
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Hapus status aktif dari semua menu
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Tampilkan halaman yang dipilih
            document.getElementById(pageId).classList.add('active');
            // Tandai menu sebagai aktif
            element.classList.add('active');
        }
    </script>
</body>
</html>
