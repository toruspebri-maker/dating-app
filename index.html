<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #00FF41; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        
        /* Panel Transparan (Hanya garis tepi & blur) */
        .glass { 
            position: absolute;
            background: rgba(0, 0, 0, 0.2); /* Sangat transparan */
            border: 1px solid #00FF41; 
            backdrop-filter: blur(10px);
            padding: 15px;
            cursor: move; /* Menandakan bisa digeser */
            touch-action: none; /* Agar lancar di layar HP */
        }

        .btn-opt { 
            background: rgba(0, 255, 65, 0.1); 
            border: 1px solid #00FF41; 
            color: #00FF41;
            padding: 8px; font-size: 10px; width: 100%; margin-bottom: 5px; cursor: pointer;
        }

        iframe { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>

    <iframe id="main-view" src="https://earth.nullschool.net/#current/wind/surface/level/orthographic=-105.41,20.25,3000"></iframe>

    <div id="drag-panel" class="glass w-60 top-4 left-4">
        <div class="font-bold text-[10px] border-b border-[#00FF41] mb-3">COMMAND_CENTER [DRAG_ME]</div>
        <button onclick="autoDetectCCTV()" class="btn-opt animate-pulse border-[#ff0000] text-[#ff0000]">>> SCAN CCTV LOKAL</button>
        <button onclick="updateView('https://earth.nullschool.net/#current/wind/surface/level/orthographic=-105.41,20.25,3000')" class="btn-opt">>> VIEW SATELLITE</button>
    </div>

    <script>
        // Fungsi Geser (Draggable)
        const panel = document.getElementById('drag-panel');
        let pos = { top: 20, left: 20 };

        panel.addEventListener('touchstart', (e) => {
            let touch = e.touches[0];
            let shiftX = touch.clientX - panel.getBoundingClientRect().left;
            let shiftY = touch.clientY - panel.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                panel.style.left = pageX - shiftX + 'px';
                panel.style.top = pageY - shiftY + 'px';
            }

            function onTouchMove(e) {
                moveAt(e.touches[0].clientX, e.touches[0].clientY);
            }

            document.addEventListener('touchmove', onTouchMove);
            panel.ontouchend = () => { document.removeEventListener('touchmove', onTouchMove); };
        });

        function updateView(url) { document.getElementById('main-view').src = url; }
        
        function autoDetectCCTV() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    if (pos.coords.latitude >= -11 && pos.coords.latitude <= 6) {
                        updateView('https://www.youtube.com/embed/live_stream?channel=UC5pP2f8Z9-hYyXw8gP4x_5g');
                    }
                });
            }
        }
    </script>
</body>
</html>
