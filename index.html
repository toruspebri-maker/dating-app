<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOC | Solana Network</title>
    <script src='//libtl.com/sdk.js' data-zone='11226289' data-sdk='show_11226289'></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        solGreen: '#14F195',
                        solPurple: '#9945FF',
                        cyberDark: '#05050A',
                    },
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #05050A; color: #e2e8f0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #network-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.25; }
        .glass-panel { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); }
        .text-glow-green { text-shadow: 0 0 10px rgba(20, 241, 149, 0.6); }
        .text-glow-purple { text-shadow: 0 0 10px rgba(153, 69, 255, 0.6); }
        .fade-in-view { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.85); opacity: 0.5; box-shadow: 0 0 0 0 rgba(20, 241, 149, 0.6); } 70% { transform: scale(1.05); opacity: 0.8; box-shadow: 0 0 0 12px rgba(20, 241, 149, 0); } 100% { transform: scale(0.85); opacity: 0.5; box-shadow: 0 0 0 0 rgba(20, 241, 149, 0); } }
        .terminal-scroll::-webkit-scrollbar { width: 3px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #14F195; border-radius: 9px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between p-0 m-0 select-none overflow-hidden">

    <canvas id="network-canvas"></canvas>

    <header class="glass-panel mx-4 mt-4 p-4 rounded-2xl flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-solPurple to-solGreen flex items-center justify-center p-[2px]">
                <div class="w-full h-full bg-cyberDark rounded-full border border-black flex items-center justify-center">
                    <span class="font-bold text-solGreen text-lg">G</span>
                </div>
            </div>
            <div>
                <h1 id="lang-title" class="text-sm font-bold text-gray-400 uppercase tracking-widest">GOC Server</h1>
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="status-text" class="text-xs text-red-500 font-mono">OFFLINE</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-400">Total Balance</div>
            <div class="font-mono text-xl font-bold text-solGreen text-glow-green" id="main-balance">0.0000000000</div>
        </div>
    </header>

    <main class="flex-1 min-h-0 relative mx-4 my-3 z-10 overflow-hidden">
        
        <div id="view-console" class="fade-in-view w-full h-full flex flex-col gap-3" style="display: flex;">
            <div class="glass-panel p-5 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden shrink-0">
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-solPurple opacity-10 blur-3xl rounded-full"></div>
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Node Operation Center</h2>
                <button id="btn-mining" class="relative w-28 h-28 rounded-full flex items-center justify-center transition-all duration-300 mb-3">
                    <div id="btn-ring" class="absolute inset-0 rounded-full border border-gray-700"></div>
                    <div id="btn-core" class="w-24 h-24 bg-gradient-to-b from-gray-800 to-black rounded-full border border-gray-700 flex items-center justify-center shadow-lg">
                        <svg class="w-8 h-8 text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                </button>
                <div class="flex w-full justify-between px-2">
                    <div class="text-left">
                        <div class="text-[10px] text-gray-500 uppercase tracking-wider">Hashrate</div>
                        <div class="font-mono text-xs font-bold text-white" id="display-hashrate">0.00 SOL/h</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-gray-500 uppercase tracking-wider">Core Temp</div>
                        <div class="font-mono text-xs font-bold text-white" id="display-temp">42°C</div>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-4 rounded-2xl flex-1 flex flex-col min-h-0 overflow-hidden">
                <div class="flex justify-between items-center mb-2 border-b border-gray-800 pb-2 shrink-0">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Live Core Terminal</span>
                    <span class="text-[10px] font-mono text-solPurple">SECURE_SSL</span>
                </div>
                <div id="terminal-output" class="font-mono text-[11px] text-gray-500 flex-1 overflow-y-auto terminal-scroll space-y-1 select-text"></div>
            </div>
        </div>

        <div id="view-tasks" class="fade-in-view w-full h-full flex flex-col min-h-0 overflow-hidden" style="display: none;">
            <h2 class="text-base font-bold text-white uppercase tracking-wider mb-3 shrink-0">Misi Operasional</h2>
            <div class="flex-1 overflow-y-auto terminal-scroll space-y-3 pr-1" id="task-list"></div>
        </div>

        <div id="view-invite" class="fade-in-view w-full h-full flex flex-col min-h-0 overflow-y-auto terminal-scroll gap-3" style="display: none;">
            <div class="glass-panel p-5 rounded-2xl text-center shrink-0">
                <h2 class="text-lg font-bold text-white tracking-wide">Ekspansi Jaringan</h2>
                <select onchange="changeLang(this.value)" class="mt-2 bg-black text-white p-2 rounded-lg text-xs w-full border border-gray-700">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English</option>
                </select>
                <div class="bg-black/40 p-3 mt-4 rounded-xl border border-gray-800 flex justify-between items-center">
                    <span class="font-mono text-xs text-gray-300">goc.net/ref/ag-8921</span>
                    <button class="bg-solPurple text-white px-3 py-1.5 rounded-lg text-xs font-bold" onclick="alert('Link disalin!')">Copy</button>
                </div>
            </div>
        </div>

        <div id="view-wallet" class="fade-in-view w-full h-full flex flex-col min-h-0 overflow-y-auto terminal-scroll gap-3" style="display: none;">
            <h2 class="text-base font-bold text-white uppercase tracking-wider mb-1 shrink-0">Manajemen Aset</h2>
            <div class="glass-panel p-4 rounded-2xl border-l-4 border-solGreen shrink-0">
                <h3 class="font-bold text-solGreen text-sm mb-1">Deposit (Min 2 USDT)</h3>
                <input type="number" id="depo-val" placeholder="Jumlah USDT" class="bg-black/40 border border-gray-800 text-white rounded-xl px-3 py-2 w-full text-xs mb-2">
                <button onclick="processDepo()" class="bg-solGreen text-black font-bold w-full py-2 rounded-xl text-xs">Proses Deposit</button>
            </div>
            <div class="glass-panel p-4 rounded-2xl border-l-4 border-solPurple shrink-0">
                <h3 class="font-bold text-solPurple text-sm mb-1">Withdraw (Min 0.1 SOL)</h3>
                <button onclick="processWithdraw()" class="bg-solPurple text-white font-bold w-full py-2 rounded-xl text-xs">Eksekusi Penarikan</button>
            </div>
        </div>
    </main>

    <nav class="glass-panel mx-4 mb-4 rounded-2xl flex justify-around p-3 z-10 border-t border-white/5 shrink-0">
        <button onclick="switchView('console')" class="nav-btn flex flex-col items-center gap-1 text-solGreen" data-target="console"><span class="text-[9px] font-bold">Console</span></button>
        <button onclick="switchView('tasks')" class="nav-btn flex flex-col items-center gap-1 text-gray-500" data-target="tasks"><span class="text-[9px] font-bold">Tasks</span></button>
        <button onclick="switchView('invite')" class="nav-btn flex flex-col items-center gap-1 text-gray-500" data-target="invite"><span class="text-[9px] font-bold">Invite</span></button>
        <button onclick="switchView('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500" data-target="wallet"><span class="text-[9px] font-bold">Wallet</span></button>
    </nav>

    <script>
        const state = {
            balance: parseFloat(localStorage.getItem('balance')) || 0.0000000000,
            baseHashrate: 0.0000000001,
            isMining: false,
            lastMine: parseFloat(localStorage.getItem('lastMine')) || 0
        };

        const elBalance = document.getElementById('main-balance');
        elBalance.textContent = state.balance.toFixed(10);

        function runAd(callback) {
            if (typeof show_11226289 !== 'undefined') {
                show_11226289({ type: 'inApp', inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false }});
                setTimeout(callback, 2000);
            } else { callback(); }
        }

        function switchView(viewId) {
            document.querySelectorAll('[id^="view-"]').forEach(el => el.style.display = 'none');
            document.getElementById('view-' + viewId).style.display = 'flex';
        }

        function tickMining() {
            state.balance += state.baseHashrate;
            elBalance.textContent = state.balance.toFixed(10);
            localStorage.setItem('balance', state.balance);
        }

        document.getElementById('btn-mining').addEventListener('click', () => {
            if (Date.now() - state.lastMine < 36000000) { alert("Mining Cooldown: 10 jam."); return; }
            runAd(() => {
                state.isMining = !state.isMining;
                if(state.isMining) {
                    state.lastMine = Date.now();
                    localStorage.setItem('lastMine', state.lastMine);
                    state.interval = setInterval(tickMining, 1000);
                } else { clearInterval(state.interval); }
            });
        });

        function processDepo() {
            const v = document.getElementById('depo-val').value;
            if(v < 2) { alert("Min deposit 2 USDT"); return; }
            alert("Deposit diproses otomatis ke alamat wallet.");
        }

        function processWithdraw() {
            if(state.balance < 0.1) { alert("Min withdraw 0.1 SOL"); return; }
            alert("Penarikan diproses.");
        }

        function changeLang(l) {
            document.getElementById('lang-title').textContent = (l === 'en') ? "GOC Node" : "GOC Server";
        }

        // Render Tasks
        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = `<div class="glass-panel p-4 rounded-xl border-l-2 border-solPurple">
                <div class="text-sm font-bold">Daily Reward</div>
                <button onclick="runAd(() => {state.balance += 0.001; localStorage.setItem('balance', state.balance); elBalance.textContent = state.balance.toFixed(10);})" class="bg-solPurple text-white px-4 py-2 mt-2 rounded-lg text-xs">Claim 0.001</button>
            </div>`;
        }
        renderTasks();

        // Canvas background
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        function draw() { requestAnimationFrame(draw); ctx.clearRect(0,0,window.innerWidth, window.innerHeight); }
        draw();
    </script>
</body>
</html>
