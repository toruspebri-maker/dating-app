<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOC | Solana Network</title>
    <script src='//libtl.com/sdk.js' data-zone='11226289' data-sdk='show_11226289'></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        solGreen: '#14F195',
                        solPurple: '#9945FF',
                        cyberDark: '#05050A',
                    },
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #05050A; color: #e2e8f0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #network-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.25; }
        .glass-panel { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); }
        .text-glow-green { text-shadow: 0 0 10px rgba(20, 241, 149, 0.6); }
        .text-glow-purple { text-shadow: 0 0 10px rgba(153, 69, 255, 0.6); }
        .fade-in-view { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.85); opacity: 0.5; box-shadow: 0 0 0 0 rgba(20, 241, 149, 0.6); } 70% { transform: scale(1.05); opacity: 0.8; box-shadow: 0 0 0 12px rgba(20, 241, 149, 0); } 100% { transform: scale(0.85); opacity: 0.5; box-shadow: 0 0 0 0 rgba(20, 241, 149, 0); } }
        .terminal-scroll::-webkit-scrollbar { width: 3px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #14F195; border-radius: 9px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between p-0 m-0 select-none overflow-hidden">

    <canvas id="network-canvas"></canvas>

    <header class="glass-panel mx-4 mt-4 p-4 rounded-2xl flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-solPurple to-solGreen flex items-center justify-center p-[2px]">
                <div class="w-full h-full bg-cyberDark rounded-full border border-black flex items-center justify-center">
                    <span class="font-bold text-solGreen text-lg">G</span>
                </div>
            </div>
            <div>
                <h1 class="text-sm font-bold text-gray-400 uppercase tracking-widest">GOC Server</h1>
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="status-text" class="text-xs text-red-500 font-mono">OFFLINE</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-400">Total Balance</div>
            <div class="font-mono text-xl font-bold text-solGreen text-glow-green" id="main-balance">0.0000000000</div>
        </div>
    </header>

    <main class="flex-1 min-h-0 relative mx-4 my-3 z-10 overflow-hidden">
        
        <div id="view-console" class="fade-in-view w-full h-full flex flex-col gap-3" style="display: flex;">
            <div class="glass-panel p-5 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden shrink-0">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Node Operation Center</h2>
                <button id="btn-mining" class="relative w-28 h-28 rounded-full flex items-center justify-center transition-all duration-300 mb-3">
                    <div id="btn-ring" class="absolute inset-0 rounded-full border border-gray-700"></div>
                    <div id="btn-core" class="w-24 h-24 bg-gradient-to-b from-gray-800 to-black rounded-full border border-gray-700 flex items-center justify-center shadow-lg">
                        <svg class="w-8 h-8 text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                </button>
                <div class="flex w-full justify-between px-2">
                    <div class="text-left"><div class="text-[10px] text-gray-500 uppercase tracking-wider">Hashrate</div><div class="font-mono text-xs font-bold text-white" id="display-hashrate">0.00 SOL/h</div></div>
                    <div class="text-right"><div class="text-[10px] text-gray-500 uppercase tracking-wider">Core Temp</div><div class="font-mono text-xs font-bold text-white" id="display-temp">42°C</div></div>
                </div>
            </div>
            <div class="glass-panel p-4 rounded-2xl flex-1 flex flex-col min-h-0 overflow-hidden">
                <div id="terminal-output" class="font-mono text-[11px] text-gray-500 flex-1 overflow-y-auto terminal-scroll space-y-1"></div>
            </div>
        </div>

        <div id="view-tasks" class="fade-in-view w-full h-full flex flex-col min-h-0 overflow-hidden" style="display: none;">
            <h2 class="text-base font-bold text-white uppercase tracking-wider mb-3">Misi & Daily Reward</h2>
            <button onclick="claimDailyReward()" class="bg-solGreen text-black font-bold py-2 px-4 rounded-xl mb-4 text-xs">Klaim Daily Reward (1x sehari)</button>
            <div class="flex-1 overflow-y-auto terminal-scroll space-y-3" id="task-list"></div>
        </div>

        <div id="view-wallet" class="fade-in-view w-full h-full flex flex-col min-h-0 overflow-y-auto terminal-scroll gap-3" style="display: none;">
            <h2 class="text-base font-bold text-white uppercase tracking-wider mb-1">Manajemen Aset</h2>
            <div class="glass-panel p-4 rounded-2xl border-l-4 border-solGreen">
                <h3 class="font-bold text-solGreen text-sm mb-2">Deposit (USDT/SOL SPL)</h3>
                <p class="text-[10px] text-gray-400 bg-black p-2 rounded break-all">GqncwViYoWEUieXTribdaMbsvp6r772TM5uCeVyZW2QE</p>
                <p class="text-[10px] text-gray-500 mt-2">Min. Deposit: 2 USDT</p>
            </div>
            <div class="glass-panel p-4 rounded-2xl border-l-4 border-solPurple">
                <h3 class="font-bold text-solPurple text-sm mb-2">Withdraw (Min 0.1 SOL)</h3>
                <input type="number" id="wd-amount" placeholder="Jumlah SOL" class="w-full bg-black p-2 rounded text-xs mb-2">
                <button onclick="handleWithdraw()" class="w-full bg-solPurple text-white py-2 rounded-xl text-xs">Eksekusi</button>
            </div>
        </div>

        <div id="view-profile" class="fade-in-view w-full h-full flex flex-col min-h-0 overflow-y-auto gap-3" style="display: none;">
            <h2 class="text-white font-bold">Profil</h2>
            <div class="glass-panel p-4 rounded-2xl">
                <p class="text-xs text-gray-400 mb-2">Pilih Bahasa:</p>
                <select class="w-full bg-black p-2 rounded text-white text-xs">
                    <option>Bahasa Indonesia</option>
                    <option>English</option>
                </select>
            </div>
        </div>
    </main>

    <nav class="glass-panel mx-4 mb-4 rounded-2xl flex justify-around p-3 z-10 border-t border-white/5">
        <button onclick="switchView('console')" class="nav-btn text-solGreen" data-target="console">Console</button>
        <button onclick="switchView('tasks')" class="nav-btn" data-target="tasks">Tasks</button>
        <button onclick="switchView('wallet')" class="nav-btn" data-target="wallet">Wallet</button>
        <button onclick="switchView('profile')" class="nav-btn" data-target="profile">Profil</button>
    </nav>

    <script>
        const state = {
            balance: parseFloat(localStorage.getItem('goc_balance')) || 0.0000000000,
            baseHashrate: 0.0000000001,
            isMining: false,
            lastDaily: parseInt(localStorage.getItem('goc_lastDaily')) || 0
        };

        function runAd(callback) {
            if (typeof show_11226289 !== 'undefined') {
                show_11226289({ type: 'inApp' });
                setTimeout(callback, 2000);
            } else { callback(); }
        }

        function saveState() {
            localStorage.setItem('goc_balance', state.balance);
            localStorage.setItem('goc_lastDaily', state.lastDaily);
        }

        function switchView(viewId) {
            ['console', 'tasks', 'wallet', 'profile'].forEach(v => {
                document.getElementById(`view-${v}`).style.display = (v === viewId) ? 'flex' : 'none';
            });
        }

        function claimDailyReward() {
            const now = Date.now();
            if (now - state.lastDaily > 86400000) {
                runAd(() => {
                    state.balance += 0.0001;
                    state.lastDaily = now;
                    saveState();
                    document.getElementById('main-balance').textContent = state.balance.toFixed(10);
                    alert("Berhasil klaim Daily Reward!");
                });
            } else { alert("Tunggu 24 jam untuk klaim berikutnya."); }
        }

        function handleWithdraw() {
            const amt = parseFloat(document.getElementById('wd-amount').value);
            if(amt < 0.1) alert("Batas penarikan minimum adalah 0.1 SOL");
            else alert("Permintaan penarikan diproses.");
        }

        // Logic mining dipertahankan dari kode asli namun dengan hashrate yang diperlambat
        btnMining.addEventListener('click', () => {
            runAd(() => {
                state.isMining = !state.isMining;
                if(state.isMining) {
                    state.miningInterval = setInterval(() => {
                        state.balance += state.baseHashrate;
                        document.getElementById('main-balance').textContent = state.balance.toFixed(10);
                        saveState();
                    }, 1000);
                } else {
                    clearInterval(state.miningInterval);
                }
            });
        });

        // Inisialisasi Canvas (kode asli)
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();
    </script>
</body>
</html>
